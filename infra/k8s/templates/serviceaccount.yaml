apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "andy-wildlife-ui.fullname" . }}
  labels:
    {{- include "andy-wildlife-ui.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
# The UI nginx container never calls the Kubernetes API.
# Disabling automount removes an unneeded attack surface.
automountServiceAccountToken: false
