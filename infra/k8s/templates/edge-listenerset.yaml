{{- if .Values.edge.enabled }}
# Istio edge: this app owns its HTTPS listener on the shared parent Gateway
# (the cluster's Istio ingress, in istio-system). The parent Gateway permits
# this namespace via allowedListeners. Replaces the old Traefik Ingress.
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: {{ include "andy-wildlife-ui.fullname" . }}
  labels:
    {{- include "andy-wildlife-ui.labels" . | nindent 4 }}
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.edge.gatewayName }}
    namespace: {{ .Values.edge.gatewayNamespace }}
  listeners:
    - name: {{ include "andy-wildlife-ui.name" . }}
      hostname: {{ .Values.ingress.host | quote }}
      # WAF cutover (2026-06-25): TLS now terminates at the Caddy+Coraza edge in
      # front of the Istio gateway, which routes this host on plain HTTP.
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}
