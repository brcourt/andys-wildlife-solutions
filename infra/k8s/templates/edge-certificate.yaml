{{- if and .Values.edge.enabled .Values.edge.issueCert }}
# cert-manager renews this app's edge TLS cert via the Istio gateway's
# HTTP-01 (gatewayHTTPRoute) solver. Adopts the existing Secret.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.edge.tlsSecret }}
  labels:
    {{- include "andy-wildlife-ui.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.edge.tlsSecret }}
  dnsNames:
    - {{ .Values.ingress.host | quote }}
  issuerRef:
    name: {{ .Values.edge.issuerName }}
    kind: ClusterIssuer
{{- end }}
