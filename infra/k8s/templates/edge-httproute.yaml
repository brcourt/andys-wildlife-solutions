{{- if .Values.edge.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "andy-wildlife-ui.fullname" . }}
  labels:
    {{- include "andy-wildlife-ui.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: {{ include "andy-wildlife-ui.fullname" . }}
      sectionName: {{ include "andy-wildlife-ui.name" . }}
  hostnames:
    - {{ .Values.ingress.host | quote }}
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "andy-wildlife-ui.fullname" . }}
          port: {{ .Values.service.port | default 80 }}
          weight: 1
{{- end }}
