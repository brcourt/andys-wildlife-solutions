{{- if .Values.networkPolicy.enabled }}
---
# Default-deny all ingress and egress for UI pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "andy-wildlife-ui.fullname" . }}-default-deny
  labels:
    {{- include "andy-wildlife-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "andy-wildlife-ui.name" . }}
      app.kubernetes.io/component: ui
  policyTypes:
    - Ingress
    - Egress
---
# Allow ingress to UI pods on port 8080 from any source in the namespace
# (covers the ingress controller and in-cluster health checks).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "andy-wildlife-ui.fullname" . }}-ingress
  labels:
    {{- include "andy-wildlife-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "andy-wildlife-ui.name" . }}
      app.kubernetes.io/component: ui
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
---
# Allow UI pods to resolve DNS only — they serve static files and make
# no outbound connections of their own.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "andy-wildlife-ui.fullname" . }}-egress-dns
  labels:
    {{- include "andy-wildlife-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "andy-wildlife-ui.name" . }}
      app.kubernetes.io/component: ui
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
